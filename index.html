<!DOCTYPE html>
<html>
<head>
    <title>SECURE_SHELL | PSNACET</title>
    <style>
        body { background: #000; color: #00ffff; font-family: monospace; padding: 20px; }
        #terminal { border: 2px solid #ff0033; height: 400px; padding: 15px; overflow-y: auto; box-shadow: 0 0 10px #ff0033; }
        .bot { color: #ff0033; margin: 5px 0; }
        .user { color: #00ffff; margin: 5px 0; }
        input { background: transparent; border: none; color: #00ffff; width: 80%; outline: none; font-family: inherit; }
    </style>
</head>
<body>
    <h2 style="color:#ff0033">PSNACET ARCHANGEL v4.0</h2>
    <div id="terminal">
        <div class="bot">[SYSTEM] Online. Linked to Render Backend.</div>
        <div id="log"></div>
    </div>
    <div style="margin-top:10px">
        <span style="color:#ff0033">admin@knull_server:~$</span>
        <input type="text" id="cmd" autofocus autocomplete="off">
    </div>

    <script>
        const input = document.getElementById('cmd');
        const log = document.getElementById('log');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const val = input.value;
                if (!val) return;
                log.innerHTML += `<div class="user">> ${val}</div>`;
                input.value = '';

                try {
                    const response = await fetch('https://web-source-mb9s.onrender.com/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: val })
                    });
                    const data = await response.json();
                    log.innerHTML += `<div class="bot">[BOT]: ${data.response}</div>`;
                } catch (err) {
                    log.innerHTML += `<div class="bot" style="color:yellow">[ERR]: Backend Offline or CORS Error. Check Render logs.</div>`;
                }
                document.getElementById('terminal').scrollTop = 999999;
            }
        });
    </script>
</body>
</html>
