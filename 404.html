<!DOCTYPE html>
<html>
<head>
    <title>ACCESS DENIED</title>
    <style>
        body { background: #1a0000; color: #ff0000; font-family: monospace; text-align: center; padding-top: 100px; }
        h1 { font-size: 50px; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            2% { color: #fff; }
            4% { color: #ff0000; }
        }
    </style>
</head>
<body>
    <h1 class="glitch">404: ACCESS DENIED</h1>
    <p>YOUR IP ADDRESS HAS BEEN LOGGED. DO NOT ATTEMPT TO BREACH THIS DIRECTORY.</p>
    <p><a href="/" style="color: #00ffff;">Return to Terminal</a></p>
</body>
</html>
